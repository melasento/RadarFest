name: Build Flutter APK

on:
  push:
    branches: [ flutter ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: flutter
          path: radarfest-src

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'

      - name: Create Flutter project scaffold
        run: flutter create --org com.melasento --project-name radarfest radarfest-build

      - name: Copy source files
        run: |
          cp -r radarfest-src/lib radarfest-build/
          cp radarfest-src/pubspec.yaml radarfest-build/pubspec.yaml
          if [ -d radarfest-src/assets ]; then
            cp -r radarfest-src/assets radarfest-build/
          fi

      - name: Get dependencies
        working-directory: radarfest-build
        run: flutter pub get

      - name: Build APK debug
        working-directory: radarfest-build
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: radarfest-debug
          path: radarfest-build/build/app/outputs/flutter-apk/app-debug.apk
