<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Friend Compass</title>
<script src="https://unpkg.com/mqtt@5/dist/mqtt.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#050813;--bg2:#07111f;--bg3:#040c18;
  --green:#00e87a;--cyan:#00c0ff;--orange:#ffa040;
  --ring:#1a3a4a;--text:#e0eef5;--dim:#4a7a99;
}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:'Segoe UI','Roboto',sans-serif;overflow:hidden}
body{display:flex;flex-direction:column}

.screen{display:none;flex-direction:column;flex:1;overflow:hidden}
.screen.active{display:flex}

/* ─── LANDING ─── */
#s-landing{align-items:center;justify-content:center;gap:16px;padding:28px 20px;overflow-y:auto}
.logo-icon{font-size:56px;line-height:1}
.logo-title{font-size:24px;font-weight:800}
.logo-sub{font-size:12px;color:var(--dim)}
.card{background:var(--bg2);border:1px solid var(--ring);border-radius:16px;
      padding:18px 20px;width:100%;max-width:360px}
.card-title{font-size:13px;font-weight:700;color:var(--cyan);margin-bottom:12px}
.field{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--ring);
       border-radius:10px;color:var(--text);font-size:14px;outline:none;
       margin-bottom:10px;font-family:inherit}
.field::placeholder{color:var(--dim)}
.btn{width:100%;padding:11px;border-radius:11px;border:none;font-size:14px;
     font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s}
.btn:active{opacity:.75}
.btn-green{background:var(--green);color:#000}
.btn-blue{background:#0077cc;color:#fff;margin-top:6px}
.btn-ghost{background:transparent;border:1px solid var(--ring);color:var(--dim);margin-top:8px}
.hint{color:var(--dim);font-size:11px;text-align:center}

/* ─── NOME + COLORE ─── */
#s-name{align-items:center;justify-content:center;padding:24px 20px}
#s-name .card{max-width:360px}
.color-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;justify-content:center}
.swatch{width:34px;height:34px;border-radius:50%;cursor:pointer;
        border:3px solid transparent;transition:transform .15s,border-color .15s;flex-shrink:0}
.swatch.sel{border-color:#fff;transform:scale(1.18)}

/* ─── TOPBAR ─── */
#topbar{display:flex;align-items:center;gap:6px;padding:8px 12px;
        background:var(--bg2);border-bottom:1px solid var(--ring);
        flex-shrink:0;min-height:46px}
.gps-status{display:flex;align-items:center;gap:5px;flex-shrink:0}
.gps-dot{width:8px;height:8px;border-radius:50%;background:#444;transition:all .4s}
.gps-dot.wait{background:#f0c000;box-shadow:0 0 6px #f0c000;animation:blink 1.2s infinite}
.gps-dot.ok{background:var(--green);box-shadow:0 0 6px var(--green)}
.gps-dot.old{background:var(--orange);box-shadow:0 0 6px var(--orange)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.gps-label{font-size:11px;color:var(--dim);white-space:nowrap}
.divider{width:1px;height:20px;background:var(--ring);flex-shrink:0}
.group-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;
            text-overflow:ellipsis;flex:1;min-width:0}
.code-badge{font-size:11px;color:var(--cyan);background:#0a1a2a;
            border:1px solid #1a3a4a;padding:2px 8px;border-radius:8px;
            letter-spacing:1.5px;cursor:pointer;flex-shrink:0;white-space:nowrap}
.top-actions{display:flex;gap:4px;flex-shrink:0}
.top-btn{width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;
         display:flex;align-items:center;justify-content:center;font-size:15px;
         background:var(--bg3);color:var(--text)}
.top-btn.green{background:#00c06033;color:var(--green)}
.top-btn.red{background:#cc220033;color:#ff6060}
.members-lbl{font-size:12px;color:var(--green);white-space:nowrap;flex-shrink:0}

/* ─── TABS ─── */
#tabs{display:flex;flex-shrink:0}
.tab{flex:1;padding:8px 0;text-align:center;font-size:13px;cursor:pointer;
     border-bottom:2px solid transparent;background:var(--bg3);color:var(--dim);
     display:flex;align-items:center;justify-content:center;gap:6px}
.tab.active{color:var(--green);border-bottom:2px solid var(--green);background:var(--bg)}
.tab-dot{width:8px;height:8px;border-radius:50%;background:currentColor;flex-shrink:0}

/* ─── RADAR ─── */
#radar-wrap{position:relative;flex:1;min-height:0;overflow:hidden;background:var(--bg)}
#radar{position:absolute;inset:0;width:100%;height:100%}
/* Etichette cardinali fisse */
.cardinal{position:absolute;font-size:12px;font-weight:700;letter-spacing:1px;
          pointer-events:none;color:var(--cyan)}
#cn{top:10px;left:50%;transform:translateX(-50%)}
#cw{top:50%;left:10px;transform:translateY(-50%)}
#ce{top:50%;right:10px;transform:translateY(-50%)}

/* ─── LISTA ─── */
#lista-view{flex:1;overflow-y:auto;padding:12px 14px;display:none;background:var(--bg)}
.fr{display:flex;align-items:center;gap:12px;padding:11px 14px;margin-bottom:9px;
    background:var(--bg2);border-radius:12px;border:1px solid var(--ring)}
.av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;
    justify-content:center;font-weight:800;font-size:15px;flex-shrink:0;border:2.5px solid}
.fi{flex:1;min-width:0}
.fn{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fs{font-size:11px;color:var(--dim);margin-top:3px}
.fd{font-size:18px;font-weight:700;white-space:nowrap;flex-shrink:0;text-align:right}
.fd small{font-size:10px;font-weight:400;color:var(--dim);display:block}

/* ─── BOTTOMBAR ─── */
#bottombar{background:#050A14;border-top:1px solid #0a2030;padding:8px 12px;flex-shrink:0}
#bar-active{display:flex;align-items:center;gap:6px}
.brb-btn{flex:1;padding:9px 10px;border-radius:10px;border:none;font-size:12px;
         font-weight:700;cursor:pointer;background:var(--orange);color:#000;font-family:inherit}
.brb-btn.on{background:#cc4400;color:#fff}
.wa-btn{padding:9px 12px;border-radius:10px;border:none;font-size:12px;font-weight:700;
        cursor:pointer;background:#25D366;color:#fff;font-family:inherit;
        display:flex;align-items:center;gap:5px;white-space:nowrap}
.ic-btn{padding:9px 10px;background:var(--bg2);border:1px solid var(--ring);
        color:var(--text);border-radius:10px;cursor:pointer;font-size:15px;line-height:1}

/* ─── TOAST / WARN ─── */
#toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);
       background:var(--green);color:#000;padding:8px 20px;border-radius:20px;
       font-size:13px;font-weight:700;opacity:0;pointer-events:none;
       transition:opacity .3s;z-index:999;white-space:nowrap;max-width:94vw;text-align:center}
#toast.show{opacity:1}
#warn{position:fixed;top:46px;left:0;right:0;background:#cc220088;
      backdrop-filter:blur(6px);color:#fff;padding:7px 16px;text-align:center;
      font-size:12px;font-weight:700;display:none;z-index:997}
#warn.show{display:block;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
</style>
</head>
<body>

<!-- ─── LANDING ─── -->
<div class="screen active" id="s-landing">
  <div class="logo-icon">🧭</div>
  <div class="logo-title">Friend Compass</div>
  <div class="logo-sub">Trova i tuoi amici in tempo reale</div>
  <div class="card">
    <div class="card-title">✨ Crea un gruppo</div>
    <button class="btn btn-green" onclick="startCreate()">Crea gruppo</button>
  </div>
  <div class="card">
    <div class="card-title">🔗 Entra con codice</div>
    <input class="field" id="code-inp" maxlength="8" placeholder="Codice (es. GNL8U7)" autocapitalize="characters"/>
    <button class="btn btn-blue" onclick="startJoin()">Unisciti al gruppo</button>
  </div>
  <p class="hint">Nessun account richiesto • Dati eliminati all'uscita</p>
</div>

<!-- ─── NOME + COLORE ─── -->
<div class="screen" id="s-name">
  <div class="card" style="max-width:360px;margin:auto">
    <div class="card-title">👤 Come ti chiami?</div>
    <input class="field" id="name-inp" maxlength="20" placeholder="Il tuo nome (es. Marco)"/>
    <div class="card-title" style="margin-top:4px">🎨 Scegli il tuo colore</div>
    <div class="color-row" id="color-row"></div>
    <button class="btn btn-green" onclick="confirmName()">Entra nel gruppo →</button>
    <button class="btn btn-ghost" onclick="goLanding()">← Indietro</button>
  </div>
</div>

<!-- ─── RADAR SCREEN ─── -->
<div class="screen" id="s-radar">

  <!-- TOPBAR identico allo screenshot -->
  <div id="topbar">
    <div class="gps-status">
      <div class="gps-dot wait" id="gps-dot"></div>
      <div class="gps-label" id="gps-label">GPS...</div>
    </div>
    <div class="divider"></div>
    <div class="group-name" id="group-lbl">Gruppo</div>
    <div class="code-badge" id="code-badge" onclick="copyCode()">—</div>
    <div class="members-lbl" id="mem-count">1 membro</div>
    <div class="top-actions">
      <button class="top-btn" onclick="showToast('🔔 Notifiche (prossimamente)')">🔔</button>
      <button class="top-btn green" onclick="shareWA()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      </button>
      <button class="top-btn red" onclick="leaveGroup()">✕</button>

  <!-- TABS -->
  <div id="tabs">
    <div class="tab active" id="tab-r" onclick="switchTab('r')">
      <span class="tab-dot" style="background:#ff4444"></span> Radar
    </div>
    <div class="tab" id="tab-l" onclick="switchTab('l')">
      ☰ <span id="lista-count">Lista (0)</span>
    </div>
  </div>

  <!-- RADAR CANVAS (centro in basso come nello screenshot) -->
  <div id="radar-wrap">
    <canvas id="radar"></canvas>
    <div class="cardinal" id="cn">N</div>
    <div class="cardinal" id="cw">W</div>

  </div>

  <!-- LISTA -->
  <div id="lista-view"></div>

  <!-- BOTTOMBAR -->
  <div id="bottombar">
    <div id="bar-active">
      <button class="brb-btn" id="brb-btn" onclick="toggleBrb()">⏱ BRB / Sto tornando</button>
      <button class="wa-btn" onclick="shareWA()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        Invita
      </button>
      <button class="ic-btn" onclick="copyLink()">🔗</button>
    </div>
  </div>
</div>

<div id="warn">⚠️ Un amico si è allontanato oltre 200m!</div>
<div id="toast"></div>

<script>
// ══════════════════════════════════════════
// MQTT — broker pubblico, zero config
// ══════════════════════════════════════════
const BROKER = 'wss://broker.emqx.io:8084/mqtt';
let mqttClient = null;

// ══════════════════════════════════════════
// COLORI
// ══════════════════════════════════════════
const COLORS = ['#00e87a','#00c0ff','#ff6b6b','#ffa040',
                '#c084fc','#facc15','#f472b6','#38bdf8',
                '#4ade80','#fb923c'];
let selColor = COLORS[1];

// ══════════════════════════════════════════
// STATO
// ══════════════════════════════════════════
let myId=null,myName='',myColor=COLORS[1],groupId=null;
let isBrb=false,myLat=null,myLon=null,myAccuracy=null;
let heading=0,friends={},predMap={},sweepAngle=0;
let gpsWatch=null,stTimer=null,gpsTs=0;
const SEP_THR=200;

// ══════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════
const uid=()=>Math.random().toString(36).substr(2,9)+Date.now().toString(36);
const rndCode=()=>Math.random().toString(36).substr(2,6).toUpperCase();
const d2r=d=>d*Math.PI/180;
function hex2rgba(h,a){
  const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function distBear(la1,lo1,la2,lo2){
  const R=6371000,f1=d2r(la1),f2=d2r(la2),df=d2r(la2-la1),dl=d2r(lo2-lo1);
  const a=Math.sin(df/2)**2+Math.cos(f1)*Math.cos(f2)*Math.sin(dl/2)**2;
  const dist=R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  const y=Math.sin(dl)*Math.cos(f2),x=Math.cos(f1)*Math.sin(f2)-Math.sin(f1)*Math.cos(f2)*Math.cos(dl);
  return {dist,bearing:(Math.atan2(y,x)*180/Math.PI+360)%360};
}
const cardinal=b=>['N','NE','E','SE','S','SO','O','NO'][Math.round(b/45)%8];
function predictPos(f){
  const p=predMap[f.id];
  if(!p||f.lat===null)return{lat:f.lat,lon:f.lon};
  const dt=(Date.now()-(f.ts||0))/1000;
  if(dt<20)return{lat:f.lat,lon:f.lon};
  const ds=(f.ts-p.ts)/1000;
  if(ds<=0)return{lat:f.lat,lon:f.lon};
  const cl=Math.min(dt,30);
  return{lat:f.lat+(f.lat-p.lat)/ds*cl,lon:f.lon+(f.lon-p.lon)/ds*cl};
}

// ══════════════════════════════════════════
// COLOR PICKER
// ══════════════════════════════════════════
function buildPicker(){
  const el=document.getElementById('color-row');el.innerHTML='';
  COLORS.forEach(c=>{
    const s=document.createElement('div');
    s.className='swatch'+(c===selColor?' sel':'');
    s.style.background=c;
    s.onclick=()=>{selColor=c;document.querySelectorAll('.swatch').forEach(x=>x.classList.remove('sel'));s.classList.add('sel');};
    el.appendChild(s);
  });
}

// ══════════════════════════════════════════
// NAV
// ══════════════════════════════════════════
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function goLanding(){show('s-landing');groupId=null;}

// ══════════════════════════════════════════
// LANDING
// ══════════════════════════════════════════
function startCreate(){groupId=rndCode();buildPicker();show('s-name');setTimeout(()=>document.getElementById('name-inp').focus(),80);}
function startJoin(){
  const c=document.getElementById('code-inp').value.trim().toUpperCase();
  if(c.length<4){showToast('⚠️ Codice non valido');return;}
  groupId=c;buildPicker();show('s-name');setTimeout(()=>document.getElementById('name-inp').focus(),80);
}
function confirmName(){
  const n=document.getElementById('name-inp').value.trim();
  if(!n){showToast('⚠️ Inserisci il tuo nome');return;}
  myName=n;myColor=selColor;myId=uid();enterGroup();
}

// ══════════════════════════════════════════
// ENTRA NEL GRUPPO
// ══════════════════════════════════════════
function enterGroup(){
  show('s-radar');
  document.getElementById('code-badge').textContent=groupId;
  document.getElementById('group-lbl').textContent='Festival';
  connectMQTT();startGps();
  if(window.DeviceOrientationEvent){
    window.addEventListener('deviceorientationabsolute',onOrient,true);
    window.addEventListener('deviceorientation',onOrient,true);
  }
}

// ══════════════════════════════════════════
// MQTT
// ══════════════════════════════════════════
function connectMQTT(){
  mqttClient=mqtt.connect(BROKER,{clientId:'fc_'+myId,clean:true,reconnectPeriod:3000,keepalive:30});
  mqttClient.on('connect',()=>{
    mqttClient.subscribe(`fc/${groupId}/#`);
    publishMember();
    showToast('🎉 Nel gruppo '+groupId);
  });
  mqttClient.on('message',(topic,payload)=>{
    try{
      const parts=topic.split('/'),type=parts[2],uid2=parts[3];
      if(uid2===myId)return;
      const data=JSON.parse(payload.toString());
      if(!friends[uid2])friends[uid2]={id:uid2,lat:null,lon:null,ts:0};
      if(type==='member'){
        if(data.online===false){delete friends[uid2];delete predMap[uid2];}
        else Object.assign(friends[uid2],{name:data.name,color:data.color,brb:data.brb,id:uid2});
      }else if(type==='pos'){
        if(friends[uid2]&&friends[uid2].lat!==null)
          predMap[uid2]={lat:friends[uid2].lat,lon:friends[uid2].lon,ts:friends[uid2].ts||0};
        Object.assign(friends[uid2],{lat:data.lat,lon:data.lon,ts:data.ts,acc:data.acc});
        checkSep();
      }
      updateUI();
    }catch(e){}
  });
  mqttClient.on('offline',()=>showToast('⚠️ Connessione persa…'));
}
function publishMember(){
  if(!mqttClient)return;
  mqttClient.publish(`fc/${groupId}/member/${myId}`,JSON.stringify({name:myName,color:myColor,brb:isBrb,online:true}),{retain:true,qos:1});
}
function publishPos(){
  if(!mqttClient||myLat===null)return;
  mqttClient.publish(`fc/${groupId}/pos/${myId}`,JSON.stringify({lat:myLat,lon:myLon,ts:Date.now(),acc:myAccuracy}),{retain:true,qos:0});
}
function removeMQTT(){
  if(!mqttClient)return;
  const empty=new Uint8Array(0);
  mqttClient.publish(`fc/${groupId}/member/${myId}`,empty,{retain:true,qos:1});
  mqttClient.publish(`fc/${groupId}/pos/${myId}`,empty,{retain:true,qos:1});
  mqttClient.end();
}

// ══════════════════════════════════════════
// GPS
// ══════════════════════════════════════════
function startGps(){
  if(!navigator.geolocation){showToast('⚠️ GPS non supportato');return;}
  const dot=document.getElementById('gps-dot'),lbl=document.getElementById('gps-label');
  dot.className='gps-dot wait';lbl.textContent='GPS...';
  gpsWatch=navigator.geolocation.watchPosition(pos=>{
    const lat=pos.coords.latitude,lon=pos.coords.longitude,acc=Math.round(pos.coords.accuracy);
    gpsTs=Date.now();
    dot.className='gps-dot ok';
    lbl.textContent='GPS ±'+acc+'m';
    if(myLat!==null){
      const d=distBear(myLat,myLon,lat,lon).dist;
      if(d<2){if(!stTimer)stTimer=setTimeout(()=>{navigator.geolocation.clearWatch(gpsWatch);dot.className='gps-dot old';lbl.textContent='GPS fermo';},60000);}
      else{clearTimeout(stTimer);stTimer=null;}
    }
    myLat=lat;myLon=lon;myAccuracy=acc;
    publishPos();
  },e=>{dot.className='gps-dot';document.getElementById('gps-label').textContent='GPS off';},
  {enableHighAccuracy:true,maximumAge:5000,timeout:20000});
}
// Aggiorna label GPS "vecchio" se nessun fix da >30s
setInterval(()=>{
  if(!gpsTs||!myLat)return;
  const age=Math.round((Date.now()-gpsTs)/1000);
  if(age>30){document.getElementById('gps-dot').className='gps-dot old';document.getElementById('gps-label').textContent='GPS vecchio ±'+(myAccuracy||'?')+'m';}
},5000);
function onOrient(e){const h=e.absolute?e.alpha:(e.webkitCompassHeading||e.alpha||0);if(h!==null)heading=h;}

function toggleBrb(){
  isBrb=!isBrb;
  const b=document.getElementById('brb-btn');
  b.textContent=isBrb?'▶ Fine BRB':'⏱ BRB / Sto tornando';

// ══════════════════════════════════════════
// SEPARAZIONE
// ══════════════════════════════════════════
function checkSep(){
  if(myLat===null)return;
  let w=false;
  Object.values(friends).forEach(f=>{if(f.lat&&distBear(myLat,myLon,f.lat,f.lon).dist>SEP_THR)w=true;});
  document.getElementById('warn').classList.toggle('show',w);
  if(w&&navigator.vibrate)navigator.vibrate([200,100,200]);
}

function switchTab(t){

  document.getElementById('radar-wrap').style.display=r?'block':'none';
  document.getElementById('lista-view').style.display=r?'none':'block';

// LISTA
// ══════════════════════════════════════════
function renderLista(){
  const el=document.getElementById('lista-view'),list=Object.values(friends);
  if(!list.length){
    el.innerHTML=`<div style="color:var(--dim);text-align:center;margin-top:60px;font-size:13px;line-height:2">
      Nessun amico nel gruppo.<br>
      Condividi il codice <b style="color:var(--cyan)">${groupId}</b><br>
      o usa il pulsante WhatsApp.</div>`;return;
  }
  el.innerHTML=list.map(f=>{
    const col=f.color||'#00c0ff',pr=predictPos(f);
    const db2=(pr.lat&&myLat)?distBear(myLat,myLon,pr.lat,pr.lon):null;
    const ds=db2?Math.round(db2.dist)+'m':'—',dr=db2?cardinal(db2.bearing):' ';
    const stale=f.ts&&(Date.now()-f.ts)>25000;
    return `<div class="fr">
      <div class="av" style="border-color:${col};color:${col};background:${hex2rgba(col,.15)}">${(f.name||'?')[0].toUpperCase()}</div>
      <div class="fi">
        <div class="fn">${f.name||'Amico'}${f.brb?' <span style="color:var(--orange)">⏱</span>':''}</div>
        <div class="fs">${dr} · ${stale?'<span style="color:var(--orange)">GPS vecchio</span>':'GPS live'}</div>
      </div>
      <div class="fd" style="color:${f.brb?'var(--orange)':col}">${ds}<small>${dr}</small></div>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════
// RADAR — centro in basso come nello screenshot
// ══════════════════════════════════════════
const canvas=document.getElementById('radar');
const ctx=canvas.getContext('2d');

function resizeCanvas(){
  const wrap=document.getElementById('radar-wrap');
  canvas.width=wrap.clientWidth||window.innerWidth;
  canvas.height=wrap.clientHeight||(window.innerHeight*0.65);
}
window.addEventListener('resize',()=>{resizeCanvas();});
resizeCanvas();

function drawRadar(){
  const W=canvas.width,H=canvas.height;
  if(!W||!H)return;
  // Centro in basso al centro — come nello screenshot
  const cx=W/2,cy=H;
  const R=H*0.97;   // raggio quasi pari all'altezza
  const MR=500;
  ctx.clearRect(0,0,W,H);

  // ── Sfondo sfumato ──
  const bg=ctx.createRadialGradient(cx,cy,0,cx,cy,R);
  bg.addColorStop(0,'#071d2a');
  bg.addColorStop(0.5,'#040e16');
  bg.addColorStop(1,'#02040A');
  ctx.beginPath();ctx.arc(cx,cy,R,Math.PI,2*Math.PI);ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();
  ctx.fillStyle=bg;ctx.fill();

  // ── Cerchi concentrici ──
  [1/3,2/3,1].forEach(f=>{
    ctx.beginPath();ctx.arc(cx,cy,R*f,Math.PI,2*Math.PI);
    ctx.strokeStyle='#1a3a4a';ctx.lineWidth=1.2;ctx.stroke();
    // Etichette distanza sull'asse N (in cima al cerchio)
    const lx=cx,ly=cy-R*f+14;
    ctx.fillStyle='#4a8a9a';ctx.font='11px sans-serif';ctx.textAlign='center';
    ctx.fillText(Math.round(MR*f)+'m',lx,ly);
  });
  ctx.textAlign='left';

  // ── Linee cardinali (W→E orizzontale + N verticale) ──
  ctx.strokeStyle='#1a3a4a88';ctx.lineWidth=0.8;
  ctx.beginPath();ctx.moveTo(0,cy);ctx.lineTo(W,cy);ctx.stroke(); // orizzontale W-E
  ctx.beginPath();ctx.moveTo(cx,0);ctx.lineTo(cx,cy);ctx.stroke(); // verticale N

  // ── Sweep animato ──
  ctx.save();ctx.translate(cx,cy);ctx.rotate(sweepAngle);
  // Cono verde
  ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,R,-Math.PI/2-0.22,-Math.PI/2+0.22);ctx.closePath();
  const cg=ctx.createLinearGradient(0,-R,0,0);
  cg.addColorStop(0,'rgba(0,232,122,0.22)');cg.addColorStop(1,'rgba(0,232,122,0)');
  ctx.fillStyle=cg;ctx.fill();
  // Glow trail (scia del sweep)
  ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,R,-Math.PI/2-0.8,-Math.PI/2+0.02);ctx.closePath();
  const tg=ctx.createLinearGradient(0,-R,0,0);
  tg.addColorStop(0,'rgba(0,200,100,0.06)');tg.addColorStop(1,'rgba(0,200,100,0)');
  ctx.fillStyle=tg;ctx.fill();
  // Linea sweep
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-R);
  ctx.strokeStyle='#00e87a';ctx.lineWidth=1.8;ctx.stroke();
  ctx.restore();

  // ── Punto IO ──
  ctx.beginPath();ctx.arc(cx,cy,7,0,Math.PI*2);
  ctx.fillStyle=myColor;ctx.shadowColor=myColor;ctx.shadowBlur=18;ctx.fill();ctx.shadowBlur=0;
  ctx.beginPath();ctx.arc(cx,cy,13,0,Math.PI*2);
  ctx.strokeStyle=myColor+'55';ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle='#ffffffcc';ctx.font='bold 11px sans-serif';ctx.textAlign='center';
  ctx.fillText(myName||'Io',cx,cy-18);ctx.textAlign='left';

  // ── Amici ──
  const now=Date.now();
  Object.values(friends).forEach(f=>{
    if(f.lat===null||myLat===null)return;
    const pr=predictPos(f);
    const {dist,bearing}=distBear(myLat,myLon,pr.lat,pr.lon);
    const r=R*Math.min(dist/MR,0.98);
    // angolo: 0°=N (su), compensato dall'heading bussola
    const ar=d2r(bearing-heading)-Math.PI/2;
    const fx=cx+r*Math.cos(ar),fy=cy+r*Math.sin(ar);
    // disegna solo se nella metà superiore del canvas
    if(fy>cy+20)return;
    const col=f.brb?'#ffa040':(f.color||'#00c0ff');
    const stale=(now-(f.ts||0))>25000,fc=stale?'#888899':col;
    // Linea tratteggiata
    ctx.save();ctx.setLineDash([3,6]);
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(fx,fy);
    ctx.strokeStyle=fc+'55';ctx.lineWidth=1;ctx.stroke();ctx.restore();
    // Dot
    ctx.beginPath();ctx.arc(fx,fy,6,0,Math.PI*2);
    ctx.fillStyle=fc;ctx.shadowColor=fc;ctx.shadowBlur=14;ctx.fill();ctx.shadowBlur=0;
    ctx.beginPath();ctx.arc(fx,fy,10,0,Math.PI*2);ctx.strokeStyle=fc+'55';ctx.lineWidth=1.5;ctx.stroke();
    // Label
    const labelX=fx+13,labelY=fy-3;
    ctx.fillStyle='#ffffffee';ctx.font='bold 11px sans-serif';ctx.fillText(f.name||'?',labelX,labelY);
    ctx.fillStyle=fc;ctx.font='10px sans-serif';ctx.fillText(Math.round(dist)+'m',labelX,labelY+12);
    if(f.brb){ctx.font='9px sans-serif';ctx.fillStyle='#ffa040';ctx.fillText('⏱ BRB',labelX,labelY+22);}
  });
}

// ── LOOP ──
let lastT=0;
(function loop(t){
  const dt=(t-lastT)/1000;lastT=t;
  sweepAngle+=dt*1.1;
  drawRadar();
  requestAnimationFrame(loop);
})();

// ══════════════════════════════════════════
// SHARE
// ══════════════════════════════════════════
function getUrl(){
  const o=location.origin;
  if(!o||o==='null'||o.startsWith('file'))return null;
  return o+location.pathname+'?group='+groupId;
}
function shareWA(){
  const url=getUrl();
  const msg=url
    ?'🧭 *Friend Compass*\nUnisciti al gruppo *'+groupId+'*!\n\n'+url
    :'🧭 *Friend Compass*\nApri l\'app e inserisci il codice: *'+groupId+'*';
  if(navigator.share&&url)navigator.share({title:'Friend Compass',text:'Gruppo: '+groupId,url}).catch(()=>window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank'));
  else window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
}
function copyLink(){
  const url=getUrl();
  if(!url){showToast('⚠️ Serve HTTPS — pubblica su Netlify');return;}
  navigator.clipboard?.writeText(url);showToast('🔗 Link copiato!');
}
function copyCode(){navigator.clipboard?.writeText(groupId);showToast('📋 Codice: '+groupId);}
function leaveGroup(){
  if(!confirm('Uscire dal gruppo?'))return;
  if(gpsWatch)navigator.geolocation.clearWatch(gpsWatch);
  removeMQTT();friends={};predMap={};show('s-landing');groupId=null;
}

// TOAST
// ══════════════════════════════════════════
let tT;
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(tT);tT=setTimeout(()=>t.classList.remove('show'),2800);}

  if(c){groupId=c.toUpperCase();document.getElementById('code-inp').value=groupId;buildPicker();show('s-name');showToast('🔗 Codice: '+groupId);}
});
