<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RadarFest</title>
<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#111;
    color:white;
}
#compass{
    width:250px;
    height:250px;
    margin:30px auto;
    border:4px solid #555;
    border-radius:50%;
    position:relative;
}
#needle{
    width:4px;
    height:110px;
    background:red;
    position:absolute;
    bottom:50%;
    left:50%;
    transform-origin:bottom center;
    transform:rotate(0deg);
}
.friend{
    padding:10px;
    margin:5px;
    background:#222;
    cursor:pointer;
    border-radius:6px;
}
.friend:hover{
    background:#333;
}
</style>
</head>
<body>

<h1>RadarFest</h1>
<p>Tocca un amico per far puntare la bussola verso di lui</p>

<div id="compass">
    <div id="needle"></div>
</div>

<h3>Amici</h3>
<div id="friends"></div>

<script>

let myLat=null;
let myLon=null;
let heading=0;
let selectedFriend=null;

// amici di esempio
const friends=[
{ name:"Marco", lat:41.9028, lon:12.4964 },
{ name:"Luca", lat:41.9038, lon:12.4974 },
{ name:"Sara", lat:41.9018, lon:12.4954 }
];

const container=document.getElementById("friends");

friends.forEach(f=>{
    const div=document.createElement("div");
    div.className="friend";
    div.textContent=f.name;
    div.onclick=()=>{selectedFriend=f};
    container.appendChild(div);
});

function toRad(d){return d*Math.PI/180}
function toDeg(r){return r*180/Math.PI}

function getBearing(lat1,lon1,lat2,lon2){

    const φ1=toRad(lat1);
    const φ2=toRad(lat2);
    const Δλ=toRad(lon2-lon1);

    const y=Math.sin(Δλ)*Math.cos(φ2);
    const x=Math.cos(φ1)*Math.sin(φ2)-
            Math.sin(φ1)*Math.cos(φ2)*Math.cos(Δλ);

    const θ=Math.atan2(y,x);
    return (toDeg(θ)+360)%360;
}

function update(){

    if(!selectedFriend||myLat===null)return;

    const bearing=getBearing(
        myLat,
        myLon,
        selectedFriend.lat,
        selectedFriend.lon
    );

    const rotation=bearing-heading;

    document.getElementById("needle").style.transform=
        `rotate(${rotation}deg)`;
}

navigator.geolocation.watchPosition(pos=>{
    myLat=pos.coords.latitude;
    myLon=pos.coords.longitude;
    update();
});

window.addEventListener("deviceorientationabsolute",e=>{
    heading=e.alpha||0;
    update();
});

</script>

</body>
</html>
