name: radarfest
description: Real-time group location tracker for events
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  mqtt_client: ^10.5.0
  geolocator: ^13.0.0
  flutter_compass: ^0.8.0
  flutter_background_service: ^5.0.5
  flutter_local_notifications: ^18.0.0
  permission_handler: ^11.3.0
  shared_preferences: ^2.3.0
  wakelock_plus: ^1.2.0
  vibration: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
